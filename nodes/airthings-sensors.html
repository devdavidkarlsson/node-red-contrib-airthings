<script type="text/javascript">
    RED.nodes.registerType('airthings-sensors', {
        category: 'Airthings',
        color: '#5bb5db',
        defaults: {
            name: { value: '' },
            configNode: { value: '', type: 'airthings-config', required: true },
            unit: { value: 'metric' },
            serialNumbers: { value: '' },
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-tachometer',
        label: function() {
            return this.name || 'airthings sensors';
        },
        paletteLabel: 'sensors',
    });
</script>

<script type="text/html" data-template-name="airthings-sensors">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-configNode"><i class="fa fa-cog"></i> Config</label>
        <input type="text" id="node-input-configNode">
    </div>
    <div class="form-row">
        <label for="node-input-unit"><i class="fa fa-balance-scale"></i> Unit</label>
        <select id="node-input-unit" style="width:70%">
            <option value="metric">Metric</option>
            <option value="imperial">Imperial</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-serialNumbers"><i class="fa fa-microchip"></i> Devices</label>
        <input type="text" id="node-input-serialNumbers" placeholder="Serial numbers, comma-separated (blank = all)">
    </div>
</script>

<script type="text/html" data-help-name="airthings-sensors">
    <p>Fetches the latest sensor readings from one or more Airthings devices.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">any</span></dt>
        <dd>Any value triggers a fetch.</dd>
        <dt class="optional">unit <span class="property-type">string</span></dt>
        <dd>Override unit system: <code>metric</code> or <code>imperial</code>.</dd>
        <dt class="optional">serialNumbers <span class="property-type">string[]</span></dt>
        <dd>Array of device serial numbers to filter. Overrides the node setting.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>A flat object keyed by serial number. Each entry has <code>sensors</code> (key/value pairs), <code>recorded</code>, and <code>batteryPercentage</code>.</dd>
    </dl>
    <p>Example output:</p>
    <pre>{
  "2930001150": {
    "sensors": { "co2": 642, "temp": 27.4, "humidity": 51 },
    "recorded": "2026-06-28T17:42:50",
    "batteryPercentage": 100
  },
  "2960000310": { "error": "API error (504)..." }
}</pre>
    <p>Use a <b>Switch</b> node on <code>msg.payload["YOUR_SN"].sensors.temp</code> to route on a specific sensor value.
    Devices that fail individually are included with an <code>error</code> key rather than stopping the whole fetch.</p>
</script>
