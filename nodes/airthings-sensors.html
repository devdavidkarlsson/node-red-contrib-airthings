<script type="text/javascript">
    RED.nodes.registerType('airthings-sensors', {
        category: 'Airthings',
        color: '#5bb5db',
        defaults: {
            name: { value: '' },
            configNode: { value: '', type: 'airthings-config', required: true },
            unit: { value: 'metric' },
            serialNumbers: { value: '' },
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-tachometer',
        label: function() {
            return this.name || 'airthings sensors';
        },
        paletteLabel: 'sensors',
        oneditprepare: function() {
            var node = this;
            var currentSNs = (node.serialNumbers || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);

            function authHeaders() {
                var tokens = RED.settings.get('auth-tokens');
                return tokens ? { 'Authorization': 'Bearer ' + tokens.access_token } : {};
            }

            function loadDevices() {
                var configId = $('#node-input-configNode').val();
                if (!configId || configId === '_ADD_') {
                    $('#airthings-device-list').html('<span style="color:#aaa;font-size:0.9em">Select a config node first.</span>');
                    return;
                }
                $('#airthings-device-list').html('<span style="color:#aaa;font-size:0.9em">Loading devices...</span>');
                $.ajax({
                    url: '/airthings/devices?configId=' + encodeURIComponent(configId),
                    type: 'GET',
                    headers: authHeaders(),
                    success: function(data) {
                        var container = $('#airthings-device-list');
                        container.empty();
                        if (!data.devices || data.devices.length === 0) {
                            container.html('<span style="color:#aaa;font-size:0.9em">No devices found.</span>');
                            return;
                        }
                        data.devices.forEach(function(device) {
                            var checked = (currentSNs.length === 0 || currentSNs.indexOf(device.serialNumber) !== -1) ? 'checked' : '';
                            container.append(
                                '<div style="margin-bottom:5px">' +
                                '<input type="checkbox" class="airthings-device-cb" id="atcb-' + device.serialNumber + '" value="' + device.serialNumber + '" ' + checked + '>' +
                                '<label for="atcb-' + device.serialNumber + '" style="width:auto;margin-left:6px;font-weight:normal">' +
                                device.name + ' <span style="color:#aaa;font-size:0.85em">' + device.type + ' &middot; ' + device.serialNumber + '</span>' +
                                '</label></div>'
                            );
                        });
                    },
                    error: function(xhr) {
                        $('#airthings-device-list').html(
                            '<span style="color:#c00;font-size:0.9em">Could not load devices (HTTP ' + xhr.status + '). Check credentials in the config node.</span>' +
                            ' <a href="#" id="airthings-retry">Retry</a>'
                        );
                        $('#airthings-retry').on('click', function(e){ e.preventDefault(); loadDevices(); });
                    }
                });
            }

            // Small delay to let the config node select widget initialise
            setTimeout(loadDevices, 100);
            $('#node-input-configNode').on('change', loadDevices);
        },
        oneditsave: function() {
            var checked = [];
            var total = $('.airthings-device-cb').length;
            $('.airthings-device-cb:checked').each(function() { checked.push($(this).val()); });
            $('#node-input-serialNumbers').val(checked.length === total ? '' : checked.join(','));
        },
    });
</script>

<script type="text/html" data-template-name="airthings-sensors">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-configNode"><i class="fa fa-cog"></i> Config</label>
        <input type="text" id="node-input-configNode">
    </div>
    <div class="form-row">
        <label for="node-input-unit"><i class="fa fa-balance-scale"></i> Unit</label>
        <select id="node-input-unit" style="width:70%">
            <option value="metric">Metric</option>
            <option value="imperial">Imperial</option>
        </select>
    </div>
    <div class="form-row">
        <label style="vertical-align:top;margin-top:4px"><i class="fa fa-microchip"></i> Devices</label>
        <div id="airthings-device-list" style="display:inline-block;vertical-align:top"></div>
        <input type="hidden" id="node-input-serialNumbers">
    </div>
</script>

<script type="text/html" data-help-name="airthings-sensors">
    <p>Fetches the latest sensor readings from your Airthings devices.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">any</span></dt>
        <dd>Any value triggers a fetch.</dd>
        <dt class="optional">unit <span class="property-type">string</span></dt>
        <dd>Override unit system: <code>metric</code> or <code>imperial</code>.</dd>
        <dt class="optional">serialNumbers <span class="property-type">string[]</span></dt>
        <dd>Array of serial numbers to fetch. Overrides the node setting.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>A flat object keyed by serial number:</dd>
    </dl>
    <pre>{
  "2930001150": {
    "sensors": { "co2": 642, "temp": 27.4, "humidity": 51 },
    "recorded": "2026-06-28T17:42:50",
    "batteryPercentage": 100
  },
  "2960000310": { "error": "API error (504)..." }
}</pre>
    <p>Use a <b>Switch</b> node on <code>msg.payload["YOUR_SN"].sensors.temp</code> to route based on a specific sensor value.
    Devices that fail individually appear with an <code>error</code> key rather than stopping the whole fetch.</p>
</script>
