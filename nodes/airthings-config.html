<script type="text/javascript">
    RED.nodes.registerType('airthings-config', {
        category: 'config',
        defaults: {
            name: { value: '' },
            accountId: { value: '' },
        },
        credentials: {
            clientId: { type: 'text' },
            clientSecret: { type: 'password' },
        },
        label: function() {
            return this.name || 'Airthings';
        },
        oneditprepare: function() {
            var configNodeId = this.id;
            $('#airthings-test-btn').on('click', function() {
                var btn = $(this);
                var status = $('#airthings-test-status');
                var clientId = $('#node-config-input-clientId').val();
                var clientSecret = $('#node-config-input-clientSecret').val();
                var nodeId = configNodeId;

                var tokens = RED.settings.get('auth-tokens');
                var authHeader = tokens ? { 'Authorization': 'Bearer ' + tokens.access_token } : {};

                btn.prop('disabled', true);
                status.css('color', '#aaa').text('Testing...');

                function handleResult(result) {
                    if (result.ok) {
                        status.css('color', '#009900').text('✓ Token acquired successfully.');
                    } else {
                        status.css('color', '#c00').text('✗ ' + result.error);
                    }
                    btn.prop('disabled', false);
                }

                // If the secret field is empty, the node is already saved — test via the deployed node
                if (!clientSecret && nodeId) {
                    $.ajax({
                        url: '/airthings/test-node?configId=' + encodeURIComponent(nodeId),
                        type: 'GET',
                        headers: authHeader,
                        success: handleResult,
                        error: function(xhr) {
                            status.css('color', '#c00').text('✗ Request failed: ' + xhr.status);
                            btn.prop('disabled', false);
                        }
                    });
                } else {
                    if (!clientId || !clientSecret) {
                        status.css('color', '#c00').text('Enter Client ID and Client Secret first.');
                        btn.prop('disabled', false);
                        return;
                    }
                    $.ajax({
                        url: '/airthings/test-credentials',
                        method: 'POST',
                        contentType: 'application/json',
                        headers: authHeader,
                        data: JSON.stringify({ clientId: clientId, clientSecret: clientSecret }),
                        success: handleResult,
                        error: function(xhr) {
                            status.css('color', '#c00').text('✗ Request failed: ' + xhr.status);
                            btn.prop('disabled', false);
                        }
                    });
                }
            });
        },
    });
</script>

<script type="text/html" data-template-name="airthings-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Airthings">
    </div>
    <div class="form-row">
        <label for="node-config-input-clientId"><i class="fa fa-key"></i> Client ID</label>
        <input type="text" id="node-config-input-clientId" placeholder="Client ID">
    </div>
    <div class="form-row">
        <label for="node-config-input-clientSecret"><i class="fa fa-lock"></i> Client Secret</label>
        <input type="password" id="node-config-input-clientSecret" placeholder="Client Secret">
    </div>
    <div class="form-row">
        <label for="node-config-input-accountId"><i class="fa fa-user"></i> Account ID</label>
        <input type="text" id="node-config-input-accountId" placeholder="Optional — auto-detected if blank">
    </div>
    <div class="form-row">
        <label></label>
        <button type="button" id="airthings-test-btn" class="red-ui-button">Test credentials</button>
        <span id="airthings-test-status" style="margin-left:10px;font-size:0.9em"></span>
    </div>
</script>

<script type="text/html" data-help-name="airthings-config">
    <p>Configuration node for the Airthings Consumer API.</p>
    <p>Create an OAuth client at <a href="https://consumer-api-doc.airthings.com/dashboard" target="_blank">consumer-api-doc.airthings.com/dashboard</a>,
    then paste the Client ID and Client Secret here.</p>
    <p>Use <b>Test credentials</b> to verify the Client ID and Secret can acquire a token before saving.</p>
    <p><strong>Account ID</strong> is optional — it will be auto-detected from your account if left blank.</p>
</script>
